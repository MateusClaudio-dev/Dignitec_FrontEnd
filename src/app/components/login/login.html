<main>
    <div class="logo-dign">
      <img class="img-main" src="/IMAGES/logo-dgn.jpg" alt="">
    </div>
    <div class="container-form">
        <form (ngSubmit)="fazerLogin()">
            <h1 class="title-fazerLogin">Fazer login</h1>
            <label for="" >Nome de usúario</label>
            <input type="name" name="nameUsuario" placeholder=""  [(ngModel)]="dadosLogin.nameUsuario" required>

            <label for="senha">Senha</label>
            <input type="password" name="senha" placeholder="" [(ngModel)]="dadosLogin.senha" required>

            <div class="opcoes-de-entrada">
                <a routerLink="/home"><small>Navegar como visitante</small></a>
                <a routerLink="/criarConta" ><small>Criar conta</small></a>
            </div>
            <button type="submit">Entrar</button>
         </form>
    </div>
</main>
